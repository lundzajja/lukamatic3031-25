    <title>Galerija - Luka Matić</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="grupisanjeElemenata.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand text-neon fw-bold fs-3" href="grupisanjeElemenata.html">Luka Matić</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">

    <main class="container my-5">
        <div class="text-center mb-5 fade-in">
            <h1 class="display-3 text-neon fw-bold mb-3">Moja Galerija</h1>
            <p class="lead fs-4 text-secondary">Ovde se nalaze fotografije i grafički radovi koje sam ja zabeležio ili napravio.</p>
        </div>

        <section class="mb-5 slide-up">
            <h2 class="text-neon mb-4 pb-2 border-bottom border-neon d-inline-block pe-4">Fotografije</h2>
            <div class="galerija-grid mt-4">
                <img src="1.jpeg" class="img-fluid custom-img" alt="Fotografija 1">
                <img src="2.jpeg" class="img-fluid custom-img img-large" alt="Fotografija 2">
                <img src="3.jpeg" class="img-fluid custom-img" alt="Fotografija 3">
                <img src="4.jpeg" class="img-fluid custom-img" alt="Fotografija 4">
                <img src="5.jpeg" class="img-fluid custom-img" alt="Fotografija 5">
                <img src="7.jpeg" class="img-fluid custom-img" alt="Fotografija 7">
                <img src="8.jpeg" class="img-fluid custom-img" alt="Fotografija 8">
                <img src="9.jpeg" class="img-fluid custom-img" alt="Fotografija 9">
                <img src="10.jpeg" class="img-fluid custom-img" alt="Fotografija 10">
                <img src="11.jpeg" class="img-fluid custom-img img-large" alt="Fotografija 11">
                <img src="12.jpeg" class="img-fluid custom-img img-large" alt="Fotografija 12">
                <img src="13.jpeg" class="img-fluid custom-img" alt="Fotografija 13">
                <img src="14.jpeg" class="img-fluid custom-img" alt="Fotografija 14">
            </div>
        </section>

        <section class="slide-up mt-5">
            <h2 class="text-neon mb-4 pb-2 border-bottom border-neon d-inline-block pe-4">Grafički Radovi</h2>
            <div class="galerija-grid mt-4 justify-content-start">
                <img src="debata.webp" class="img-fluid custom-img img-grafika" alt="Graficki rad">
            </div>
        </section>
    </main>

    <footer class="footer mt-auto py-5 border-top border-neon text-center bg-black">
        <div class="container">
            <a href="https://va.akademijazs.edu.rs/" class="d-inline-block mb-3 logo-hover">
                <img src="9-Akademija-logo-sivi.png" height="80" alt="Logo">
            </a>
            <p class="text-neon mb-1 fs-5">Primer iz vežbe predmeta Web Dizajn</p>
            <p class="small text-secondary mb-0">&copy; 2026 Akademija strukovnih studija Zapadna Srbija odsek Valjevo</p>
        </div>
