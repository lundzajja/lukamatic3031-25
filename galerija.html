<html lang="sr" data-bs-theme="dark">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand text-neon fw-bold fs-3" href="index.html">Luka Matić</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Početak & O meni</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="galerija.html">Galerija</a>

                    <li class="nav-item">
                        <a class="nav-link" href="kontakt.html">Kontakt</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 px-4">
        <div class="text-center mb-5 fade-in">
            <h1 class="display-3 text-neon fw-bold mb-3">Moja galerija</h1>
            <p class="lead fs-4 text-secondary">Ovde se nalaze fotografije i grafički radovi koje sam ja zabeležio ili napravio.</p>
        </div>

        <section class="mb-5 slide-up">
            <h2 class="text-neon mb-4 pb-2 border-bottom border-neon d-inline-block pe-4">Fotografije</h2>
            <div class="galerija-grid mt-4">
                <img src="1.jpeg" class="custom-img" alt="Fotografija 1" decoding="async">
                <img src="2.jpeg" class="custom-img img-large" alt="Fotografija 2" decoding="async">
                <img src="3.jpeg" class="custom-img" alt="Fotografija 3" loading="lazy" decoding="async">
                <img src="4.jpeg" class="custom-img" alt="Fotografija 4" loading="lazy" decoding="async">
                <img src="5.jpeg" class="custom-img" alt="Fotografija 5" loading="lazy" decoding="async">
                <img src="7.jpeg" class="custom-img" alt="Fotografija 7" loading="lazy" decoding="async">
                <img src="8.jpeg" class="custom-img" alt="Fotografija 8" loading="lazy" decoding="async">
                <img src="9.jpeg" class="custom-img" alt="Fotografija 9" loading="lazy" decoding="async">
                <img src="10.jpeg" class="custom-img" alt="Fotografija 10" loading="lazy" decoding="async">
                <img src="11.jpeg" class="custom-img img-large" alt="Fotografija 11" loading="lazy" decoding="async">
                <img src="12.jpeg" class="custom-img img-large" alt="Fotografija 12" loading="lazy" decoding="async">
                <img src="13.jpeg" class="custom-img" alt="Fotografija 13" loading="lazy" decoding="async">
                <img src="14.jpeg" class="custom-img" alt="Fotografija 14" loading="lazy" decoding="async">
            </div>
        </section>

        <section class="slide-up mt-5">
            <h2 class="text-neon mb-4 pb-2 border-bottom border-neon d-inline-block pe-4">Grafički radovi</h2>
            <div class="galerija-grid mt-4">
                <img src="debata.webp" class="custom-img img-grafika" alt="Graficki rad" loading="lazy" decoding="async">
            </div>
        </section>
    </main>

    <footer class="footer mt-auto py-5 border-top border-neon text-center bg-black">
        <div class="container">
            <a href="https://va.akademijazs.edu.rs/" class="d-inline-block mb-3 logo-hover">
                <img src="9-Akademija-logo-sivi.png" height="80" alt="Logo">
            </a>
            <p class="text-neon mb-1 fs-5">Projekat 1 iz predmeta Web dizajn</p>
            <p class="small text-secondary mb-0">&copy; 2026 Akademija strukovnih studija Zapadna Srbija odsek Valjevo</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
